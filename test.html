<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Galeria com Próximo e Voltar</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      display: flex;
      justify-content: center;
      margin-top: 50px;
    }

    .container {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .galeria {
      display: flex;
      gap: 10px;
    }

    .galeria img {
      width: 150px;
      height: 100px;
      object-fit: cover;
      border-radius: 8px;
    }

    button {
      padding: 10px 15px;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <div class="container">
    <button onclick="voltar()">Voltar</button>

    <div class="galeria" id="galeria">
      <!-- imagens aparecem aqui -->
    </div>

    <button onclick="seguinte()">Seguinte</button>
  </div>

  <script>
    const imagens = [
      "https://picsum.photos/id/1015/300/200",
      "https://picsum.photos/id/1016/300/200",
      "https://picsum.photos/id/1018/300/200",
      "https://picsum.photos/id/1020/300/200",
      "https://picsum.photos/id/1024/300/200",
      "https://picsum.photos/id/1027/300/200"
    ];

    let indiceAtual = 0;
    const imagensPorPagina = 3;

    const galeria = document.getElementById("galeria");

    function renderizar() {
      galeria.innerHTML = "";

      for (let i = indiceAtual; i < indiceAtual + imagensPorPagina; i++) {
        if (imagens[i]) {
          const img = document.createElement("img");
          img.src = imagens[i];
          galeria.appendChild(img);
        }
      }
    }

    function seguinte() {
      if (indiceAtual + imagensPorPagina < imagens.length) {
        indiceAtual += imagensPorPagina;
        renderizar();
      }
    }

    function voltar() {
      if (indiceAtual - imagensPorPagina >= 0) {
        indiceAtual -= imagensPorPagina;
        renderizar();
      }
    }

    renderizar();
  </script>

</body>
</html>
